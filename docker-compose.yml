services:
  postgres:
    container_name: white_finance-postgres
    image: 'postgres:15'
    hostname: ${POSTGRE_HOST}
    ports:
      - 5432:5432
    command: "-p 5432"
    env_file:
      - .env
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    restart: always
  notebooks:
    container_name: white_finance-notebooks
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    ports:
      - 8888:8888
    env_file:
      - .env
    # depends_on:
    #   - postgres
    volumes:
      - ./notebooks:/home/jovyan/work
      - ./data/analytics:/home/jovyan/data
      - ./scripts:/home/jovyan/scripts
  dashboard:
    container_name: white_finance-dashboard
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    ports:
      - 8050:8050
    env_file:
      - .env
    environment:
      # Directorio donde están los CSVs dentro del contenedor
      - DATA_DIR=/home/jovyan/data
      - DASH_HOST=0.0.0.0
      - DASH_PORT=8050
      - DASH_DEBUG=false
    volumes:
      - ./apps:/home/jovyan/apps
      # Montar ./data completo para acceder a profit.csv y cuentas corrientes
      - ./data/analytics:/home/jovyan/data
    command: [ "python", "/home/jovyan/apps/dashboard.py" ]
