# Configuración de clientes
# Cada cliente tiene:
# - id: Identificador único
# - name: Nombre del cliente
# - broker: Broker que utiliza (bull_market o balanz)
# - source_folder: Carpeta donde se descargan sus archivos

clients:
  - id: 1
    name: "Mariano Ibarra"
    broker: "Balanz"
    source_folder: "mariano_ibarra"
    active: true
    
  - id: 2
    name: "Rafael Custodia"
    broker: "Balanz"
    source_folder: "rafael_custodia"
    active: true

# Configuración de brokers
brokers:
  bull_market:
    name: "Bull Market Brokers"
    file_patterns:
      - "*_mv_*.xlsx"
      - "*movimientos*.xlsx"
    
  balanz:
    name: "Balanz Capital"
    file_patterns:
      - "*_mv_*.xlsx"
      - "*Cuenta Corriente - *.xlsx"
